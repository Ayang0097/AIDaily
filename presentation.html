<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI日报 App - 产品演示</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', -apple-system, sans-serif; }
    .slide { display: none; }
    .slide.active { display: block; }
    .phone-mock {
      width: 320px;
      height: 650px;
      background: #f8fafc;
      border-radius: 32px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .progress-bar { transition: width 0.3s ease; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">
  
  <!-- Presentation Container -->
  <div class="flex items-center justify-center min-h-screen p-8">
    
    <div class="max-w-6xl w-full">
      
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-white mb-2">AI日报 App</h1>
        <p class="text-purple-300">一站式AI资讯聚合与消费平台</p>
      </div>
      
      <!-- Main Content Area -->
      <div class="flex gap-8 items-center justify-center flex-wrap">
        
        <!-- Phone Mockup -->
        <div class="phone-mock" id="phoneDisplay">
          <!-- Will be populated by JS -->
        </div>
        
        <!-- Info Panel -->
        <div class="text-white max-w-md">
          <div id="slideTitle" class="text-2xl font-bold mb-4">产品介绍</div>
          <div id="slideContent" class="text-purple-200 leading-relaxed mb-6">
            <p>AI日报是一款专注于AI领域的资讯聚合平台。</p>
            <p class="mt-2">为AI从业者、开发者、投资人提供一站式的每日资讯消费体验。</p>
          </div>
          
          <!-- Navigation -->
          <div class="flex gap-2 mb-6">
            <button onclick="prevSlide()" class="px-4 py-2 bg-white/10 rounded-lg hover:bg-white/20 transition">← 上一个</button>
            <button onclick="nextSlide()" class="px-4 py-2 bg-purple-600 rounded-lg hover:bg-purple-700 transition">下一个 →</button>
          </div>
          
          <!-- Slide Indicators -->
          <div class="flex gap-2" id="indicators">
            <!-- Generated by JS -->
          </div>
          
          <!-- Progress -->
          <div class="mt-6 bg-white/10 rounded-full h-2">
            <div class="bg-purple-500 h-2 rounded-full progress-bar" id="progressBar" style="width: 20%"></div>
          </div>
        </div>
        
      </div>
      
      <!-- Footer -->
      <div class="text-center mt-8 text-purple-400 text-sm">
        按 ← → 键翻页 | 按空格键自动播放
      </div>
      
    </div>
    
  </div>
  
  <script>
    const slides = [
      {
        title: '🎯 产品定位',
        content: '<p>聚焦AI领域的资讯聚合与解读平台</p><p class="mt-2">为AI从业者、开发者、投资人提供一站式的每日资讯消费体验</p><p class="mt-2 text-yellow-300">核心价值：省时间、有深度、可追溯</p>'
      },
      {
        title: '📰 资讯聚合',
        content: '<p>• RSS订阅：虎嗅、爱范儿、钛媒体、少数派、Solidot、36kr</p><p class="mt-2">• Twitter监控：AI领域KOL推文</p><p class="mt-2">• 智能去重 + 分类整理</p><p class="mt-2 text-green-300">每日自动更新，保持内容新鲜</p>'
      },
      {
        title: '🤖 AI智能摘要',
        content: '<p>• 每条资讯生成100字摘要</p><p class="mt-2">• ⭐1-5星标记重要程度</p><p class="mt-2">• 一句话犀利点评</p><p class="mt-2 text-blue-300">基于GPT-4的智能分析</p>'
      },
      {
        title: '📱 核心功能',
        content: '<p>✅ 今日日报 - 每日精选资讯</p><p>✅ 历史日报 - 按日期回顾</p><p>✅ 收藏夹 - 收藏感兴趣内容</p><p>✅ 分享 - 一键分享到微信</p><p>✅ 推送 - 定时推送到微信</p>'
      },
      {
        title: '🛠️ 技术架构',
        content: '<p><strong>前端</strong>：React + TailwindCSS + Zustand</p><p class="mt-2"><strong>后端</strong>：Node.js + Express + SQLite</p><p class="mt-2"><strong>数据</strong>：RSS抓取 + AI摘要生成</p><p class="mt-2"><strong>部署</strong>：支持Docker一键部署</p>'
      },
      {
        title: '🚀 快速开始',
        content: '<p class="text-green-300">前端：npm install && npm run dev</p><p class="mt-2 text-blue-300">后端：npm install && npm run dev</p><p class="mt-2 text-yellow-300">访问：http://localhost:3000</p><p class="mt-2 text-purple-300">API：http://localhost:3001</p>'
      }
    ]
    
    let currentSlide = 0
    
    function renderPhone() {
      const phone = document.getElementById('phoneDisplay')
      const slide = slides[currentSlide]
      
      const colors = [
        'from-indigo-600 to-purple-600',
        'from-green-600 to-teal-600',
        'from-blue-600 to-cyan-600',
        'from-orange-600 to-red-600',
        'from-purple-600 to-pink-600',
        'from-yellow-600 to-orange-600'
      ]
      
      phone.innerHTML = `
        <div class="h-full flex flex-col bg-gradient-to-br ${colors[currentSlide]} text-white p-6">
          <div class="text-xs opacity-80">AI日报</div>
          <div class="text-2xl font-bold mt-2">${slide.title}</div>
          <div class="flex-1 mt-6 text-sm leading-relaxed opacity-90">
            ${slide.content}
          </div>
          <div class="text-xs opacity-60 mt-auto">
            ${currentSlide + 1} / ${slides.length}
          </div>
        </div>
      `
    }
    
    function updateIndicators() {
      const container = document.getElementById('indicators')
      container.innerHTML = slides.map((_, i) => `
        <button 
          onclick="goToSlide(${i})"
          class="w-3 h-3 rounded-full transition-colors ${i === currentSlide ? 'bg-purple-500' : 'bg-white/30'}"
        ></button>
      `).join('')
      
      document.getElementById('progressBar').style.width = `${((currentSlide + 1) / slides.length) * 100}%`
    }
    
    function updateContent() {
      const slide = slides[currentSlide]
      document.getElementById('slideTitle').textContent = slide.title
      document.getElementById('slideContent').innerHTML = slide.content
    }
    
    function nextSlide() {
      currentSlide = (currentSlide + 1) % slides.length
      renderPhone()
      updateContent()
      updateIndicators()
    }
    
    function prevSlide() {
      currentSlide = (currentSlide - 1 + slides.length) % slides.length
      renderPhone()
      updateContent()
      updateIndicators()
    }
    
    function goToSlide(index) {
      currentSlide = index
      renderPhone()
      updateContent()
      updateIndicators()
    }
    
    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault()
        nextSlide()
      } else if (e.key === 'ArrowLeft') {
        prevSlide()
      }
    })
    
    // Auto-play
    let autoPlay = setInterval(nextSlide, 5000)
    
    // Pause on hover
    document.querySelector('.phone-mock').addEventListener('mouseenter', () => {
      clearInterval(autoPlay)
    })
    document.querySelector('.phone-mock').addEventListener('mouseleave', () => {
      autoPlay = setInterval(nextSlide, 5000)
    })
    
    // Initialize
    renderPhone()
    updateContent()
    updateIndicators()
  </script>
  
</body>
</html>
